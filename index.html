<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Nutrition">
  <meta name="theme-color" content="#205781">
  <meta name="description" content="Katjas Nutrition & Makro Tracker">

  <title>Nutrition Tracker</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" href="icons/favicon.png">

  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Macro colors */
      --kcal: #205781;
      --protein: #006D77;
      --carbs: #4F959D;
      --fat: #7AB2B2;

      /* Day type colors */
      --dt-workout: #A42059;
      --dt-rest: #7AB2B2;
      --dt-friday: #205781;

      /* Warning colors */
      --warn-mid: #623c6d;
      --warn-high: #A42059;

      /* UI colors */
      --bg: #f4f4f2;
      --card: #fff;
      --border-1: #e8e8e6;
      --border-2: #ececea;
      --border-3: #f0f0ee;
      --text-1: #1a1a1a;
      --text-2: #888;
      --text-3: #aaa;
      --text-4: #ccc;

      /* Spacing */
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --nav-height: 56px;
      --header-height: 220px;

      /* Font */
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    html, body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-1);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
      height: 100%;
      width: 100%;
      touch-action: manipulation;
    }

    input, button, textarea {
      font-family: var(--font);
      font-size: 16px; /* prevent iOS zoom */
    }

    /* ── App Container ── */
    .app-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    /* ── Screens ── */
    .screen {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 16px);
    }

    .today-screen {
      padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 24px);
    }

    /* ── Splash ── */
    .splash {
      display: flex; align-items: center; justify-content: center;
      height: 100dvh; background: var(--bg);
    }
    .splash-icon { font-size: 64px; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.95); } }

    /* ── Sticky Header ── */
    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      padding: calc(var(--safe-top) + 12px) 16px 12px;
      border-bottom: 0.5px solid var(--border-2);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .header-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .header-date {
      font-size: 15px;
      color: var(--text-2);
      font-weight: 400;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-nav-arrows {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .nav-arrow {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-2);
      transition: background 0.15s;
    }
    .nav-arrow:active { background: var(--border-2); }

    .kw-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-2);
      min-width: 48px;
      text-align: center;
    }

    /* ── Week Strip ── */
    .week-strip {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      margin-bottom: 12px;
    }

    .week-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 2px;
      border-radius: 10px;
      transition: background 0.15s;
    }
    .week-day.selected { background: rgba(32, 87, 129, 0.06); }
    .week-day:active { background: var(--border-3); }

    .week-day-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-3);
      letter-spacing: 0.3px;
    }
    .week-day-label.today-label {
      color: var(--text-1);
      font-weight: 700;
    }

    /* ── Macro Bars ── */
    .macro-bars {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .macro-bar {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .macro-bar-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .macro-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .macro-values {
      font-size: 12px;
      color: var(--text-2);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .macro-bar-track {
      height: 5px;
      background: var(--border-2);
      border-radius: 3px;
      overflow: hidden;
    }

    .macro-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease, background 0.3s ease;
    }

    /* ── Screen Body ── */
    .screen-body {
      padding: 16px;
    }

    /* ── Segmented Picker ── */
    .seg-picker {
      display: flex;
      align-items: center;
      background: #dededa;
      border-radius: 12px;
      padding: 3px;
      position: relative;
      margin-bottom: 16px;
    }

    .seg-pill {
      position: absolute;
      top: 3px;
      height: calc(100% - 6px);
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12), 0 0.5px 1.5px rgba(0,0,0,0.06);
      transition: left 0.25s ease, width 0.25s ease;
      z-index: 0;
    }

    .seg-item {
      flex: 1;
      text-align: center;
      padding: 8px 0;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-1);
      cursor: pointer;
      position: relative;
      z-index: 1;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .seg-item.active { font-weight: 600; }

    .seg-divider {
      width: 1px;
      height: 18px;
      background: #bbb;
      flex-shrink: 0;
      z-index: 1;
      transition: opacity 0.2s;
    }
    .seg-divider.hidden { opacity: 0; }

    /* ── Meals List ── */
    .meals-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Meal Card ── */
    .meal-card {
      background: var(--card);
      border-radius: 14px;
      border: 0.5px solid var(--border-1);
      overflow: hidden;
    }

    .meal-card-header {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      gap: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .meal-card-header:active { background: var(--border-3); }

    .meal-icon-wrap {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #f5f5f3;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .meal-icon { font-size: 18px; }

    .meal-info { flex: 1; min-width: 0; }

    .meal-name {
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .std-badge {
      font-size: 9px;
      font-weight: 500;
      background: var(--border-2);
      color: var(--text-3);
      padding: 1px 5px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .meal-macros-preview {
      font-size: 12px;
      color: var(--text-2);
      margin-top: 2px;
      display: flex;
      gap: 4px;
      align-items: center;
      font-variant-numeric: tabular-nums;
    }

    .macro-dot { color: var(--text-4); }

    .empty-meal {
      font-style: italic;
      color: var(--text-3);
    }

    .meal-chevron {
      color: var(--text-3);
      flex-shrink: 0;
    }

    .meal-card-body {
      background: #fafaf8;
      border-top: 0.5px solid var(--border-2);
      padding: 10px 14px 12px;
    }

    .meal-items {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .meal-item-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-size: 13px;
    }

    .item-name {
      flex: 1;
      color: var(--text-1);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .item-amount {
      color: var(--text-2);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .item-macros {
      color: var(--text-3);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .meal-edit-link {
      font-size: 13px;
      font-weight: 500;
      color: var(--kcal);
      cursor: pointer;
      padding-top: 4px;
    }
    .meal-edit-link:active { opacity: 0.6; }

    /* ── Day Total ── */
    .day-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      padding: 14px 16px;
      background: var(--card);
      border-radius: 14px;
      border: 0.5px solid var(--border-1);
    }

    .day-total-label {
      font-size: 14px;
      font-weight: 700;
    }

    .day-total-macros {
      display: flex;
      gap: 10px;
      font-size: 13px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    /* ── Bottom Navigation ── */
    .bottom-nav {
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: var(--card);
      border-top: 0.5px solid var(--border-1);
      padding: 6px 0 calc(6px + var(--safe-bottom));
      position: relative;
      z-index: 20;
      flex-shrink: 0;
    }

    .nav-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 4px 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      color: #bbb;
      transition: color 0.15s;
    }
    .nav-tab.active { color: var(--kcal); }

    .nav-icon { width: 22px; height: 22px; }
    .nav-label { font-size: 10px; font-weight: 500; }

    /* ── Loading State ── */
    .loading-state {
      text-align: center;
      color: var(--text-3);
      padding: 40px 0;
      font-size: 15px;
    }

    /* ── Placeholder Screens ── */
    .placeholder-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
    }
    .placeholder-icon { font-size: 48px; margin-bottom: 16px; }
    .placeholder-screen h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .placeholder-screen p { font-size: 14px; color: var(--text-2); line-height: 1.5; }

    /* ── Login Screen ── */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
      background: var(--bg);
    }

    .login-card {
      width: 100%;
      max-width: 340px;
      text-align: center;
    }

    .login-icon-img { width: 72px; height: 72px; border-radius: 16px; margin-bottom: 12px; }

    .login-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .login-subtitle {
      font-size: 14px;
      color: var(--text-2);
      margin-bottom: 32px;
    }

    .login-fields {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }

    .login-input {
      width: 100%;
      padding: 14px 16px;
      border: 0.5px solid var(--border-1);
      border-radius: 12px;
      background: var(--card);
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .login-input:focus { border-color: var(--kcal); }

    .login-error {
      font-size: 13px;
      color: var(--warn-high);
      margin-bottom: 12px;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--kcal);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .login-btn:active { opacity: 0.85; }
    .login-btn.loading { opacity: 0.6; pointer-events: none; }

    /* ── Settings ── */
    .settings-screen { padding: 24px 16px; }
    .settings-title { font-size: 28px; font-weight: 700; margin-bottom: 24px; }
    .settings-section { margin-bottom: 24px; }
    .settings-label { font-size: 12px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; padding-left: 4px; }
    .settings-card { background: var(--card); border-radius: 14px; border: 0.5px solid var(--border-1); overflow: hidden; }
    .settings-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; font-size: 15px; }
    .settings-row + .settings-row { border-top: 0.5px solid var(--border-2); }
    .settings-row.clickable { cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .settings-row.clickable:active { background: var(--border-3); }
    .settings-row.danger { color: var(--warn-high); }
    .settings-value { color: var(--text-2); font-size: 14px; }
    .settings-arrow { color: var(--text-3); }
    .settings-version { text-align: center; color: var(--text-4); font-size: 12px; margin-top: 32px; }

    /* ── Bottom Sheet (Edit Meal) ── */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } }

    .sheet {
      background: var(--card);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 430px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 8px 20px calc(20px + var(--safe-bottom));
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: var(--border-2);
      border-radius: 2px;
      margin: 4px auto 16px;
    }

    .sheet-header h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .sheet-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .sheet-input {
      width: 100%;
      padding: 12px 14px;
      border: 0.5px solid var(--border-1);
      border-radius: 10px;
      font-size: 16px;
      background: var(--bg);
      outline: none;
    }
    .sheet-input:focus { border-color: var(--kcal); }

    .sheet-macros-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .sheet-macro {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sheet-macro-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .sheet-macro-input {
      width: 100%;
      padding: 10px 12px;
      border: 0.5px solid var(--border-1);
      border-radius: 10px;
      font-size: 16px;
      background: var(--bg);
      outline: none;
      font-variant-numeric: tabular-nums;
    }
    .sheet-macro-input:focus { border-color: var(--kcal); }

    .sheet-footer {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .sheet-btn {
      flex: 1;
      padding: 14px;
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .sheet-btn.cancel {
      background: var(--border-2);
      color: var(--text-1);
    }
    .sheet-btn.save {
      background: var(--kcal);
      color: #fff;
    }
    .sheet-btn:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
