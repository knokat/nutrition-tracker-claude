<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Nutrition">
  <meta name="theme-color" content="#205781">
  <meta name="description" content="Katjas Nutrition & Makro Tracker">

  <title>Nutrition Tracker</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" href="icons/favicon.png">

  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Macro colors */
      --kcal: #205781;
      --protein: #006D77;
      --carbs: #4F959D;
      --fat: #7AB2B2;

      /* Day type colors */
      --dt-workout: #A42059;
      --dt-rest: #7AB2B2;
      --dt-friday: #205781;

      /* Warning colors */
      --warn-mid: #623c6d;
      --warn-high: #A42059;

      /* UI colors */
      --bg: #f4f4f2;
      --card: #fff;
      --border-1: #e8e8e6;
      --border-2: #ececea;
      --border-3: #f0f0ee;
      --text-1: #1a1a1a;
      --text-2: #888;
      --text-3: #aaa;
      --text-4: #ccc;

      /* Spacing */
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --nav-height: 56px;
      --header-height: 220px;

      /* Font */
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    html, body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-1);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
      height: 100%;
      width: 100%;
      touch-action: manipulation;
    }

    input, button, textarea {
      font-family: var(--font);
      font-size: 16px; /* prevent iOS zoom */
    }

    /* ── App Container ── */
    .app-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    /* ── Screens ── */
    .screen {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 16px);
    }

    .today-screen {
      padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 24px);
    }

    /* ── Splash ── */
    .splash {
      display: flex; align-items: center; justify-content: center;
      height: 100dvh; background: var(--bg);
    }
    .splash-logo { width: 72px; height: 72px; border-radius: 16px; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.95); } }

    /* ── Sticky Header ── */
    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      padding: calc(var(--safe-top) + 12px) 16px 12px;
      border-bottom: 0.5px solid var(--border-2);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .header-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .header-date {
      font-size: 15px;
      color: var(--text-2);
      font-weight: 400;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-nav-arrows {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .nav-arrow {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-2);
      transition: background 0.15s;
    }
    .nav-arrow:active { background: var(--border-2); }
    .settings-gear { margin-left: 4px; }

    .kw-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-2);
      min-width: 48px;
      text-align: center;
    }

    /* ── Week Strip ── */
    .week-strip {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      margin-bottom: 12px;
    }

    .week-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 2px;
      border-radius: 10px;
      transition: background 0.15s;
    }
    .week-day.selected { background: rgba(32, 87, 129, 0.06); }
    .week-day:active { background: var(--border-3); }

    .week-day-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-3);
      letter-spacing: 0.3px;
    }
    .week-day-label.today-label {
      color: var(--text-1);
      font-weight: 700;
    }

    /* ── Macro Bars ── */
    .macro-bars {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .macro-bar {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .macro-bar-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .macro-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .macro-values {
      font-size: 12px;
      color: var(--text-2);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .macro-bar-track {
      height: 5px;
      background: var(--border-2);
      border-radius: 3px;
      overflow: hidden;
    }

    .macro-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease, background 0.3s ease;
    }

    /* ── Screen Body ── */
    .screen-body {
      padding: 16px;
    }

    /* ── Segmented Picker ── */
    .seg-picker {
      display: flex;
      align-items: center;
      background: #dededa;
      border-radius: 12px;
      padding: 3px;
      position: relative;
      margin-bottom: 16px;
    }

    .seg-pill {
      position: absolute;
      top: 3px;
      height: calc(100% - 6px);
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12), 0 0.5px 1.5px rgba(0,0,0,0.06);
      transition: left 0.25s ease, width 0.25s ease;
      z-index: 0;
    }

    .seg-item {
      flex: 1;
      text-align: center;
      padding: 8px 0;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-1);
      cursor: pointer;
      position: relative;
      z-index: 1;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .seg-item.active { font-weight: 600; }

    .seg-divider {
      width: 1px;
      height: 18px;
      background: #bbb;
      flex-shrink: 0;
      z-index: 1;
      transition: opacity 0.2s;
    }
    .seg-divider.hidden { opacity: 0; }

    /* ── Meals List ── */
    .meals-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Meal Card ── */
    .meal-card {
      background: var(--card);
      border-radius: 14px;
      border: 0.5px solid var(--border-1);
      overflow: hidden;
    }

    .meal-card-header {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      gap: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .meal-card-header:active { background: var(--border-3); }

    .meal-icon-wrap {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #f5f5f3;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .meal-icon { font-size: 18px; }

    .meal-info { flex: 1; min-width: 0; }

    .meal-name {
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .std-badge {
      font-size: 9px;
      font-weight: 500;
      background: var(--border-2);
      color: var(--text-3);
      padding: 1px 5px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .meal-macros-preview {
      font-size: 12px;
      color: var(--text-2);
      margin-top: 2px;
      display: flex;
      gap: 4px;
      align-items: center;
      font-variant-numeric: tabular-nums;
    }

    .macro-dot { color: var(--text-4); }

    .empty-meal {
      font-style: italic;
      color: var(--text-3);
    }

    .meal-chevron {
      color: var(--text-3);
      flex-shrink: 0;
    }

    .meal-card-body {
      background: #fafaf8;
      border-top: 0.5px solid var(--border-2);
      padding: 10px 14px 12px;
    }

    .meal-items {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .meal-item-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-size: 13px;
    }

    .item-name {
      flex: 1;
      color: var(--text-1);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .item-amount {
      color: var(--text-2);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .item-macros {
      color: var(--text-3);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .meal-edit-link {
      font-size: 13px;
      font-weight: 500;
      color: var(--kcal);
      cursor: pointer;
      padding-top: 4px;
    }
    .meal-edit-link:active { opacity: 0.6; }

    /* ── Day Total ── */
    .day-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      padding: 14px 16px;
      background: var(--card);
      border-radius: 14px;
      border: 0.5px solid var(--border-1);
    }

    .day-total-label {
      font-size: 14px;
      font-weight: 700;
    }

    .day-total-macros {
      display: flex;
      gap: 10px;
      font-size: 13px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    /* ── Bottom Navigation ── */
    .bottom-nav {
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: var(--card);
      border-top: 0.5px solid var(--border-1);
      padding: 6px 0 calc(6px + var(--safe-bottom));
      position: relative;
      z-index: 20;
      flex-shrink: 0;
    }

    .nav-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 4px 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      color: #bbb;
      transition: color 0.15s;
    }
    .nav-tab.active { color: var(--kcal); }

    .nav-icon { width: 22px; height: 22px; }
    .nav-label { font-size: 10px; font-weight: 500; }

    /* ── Loading State ── */
    .loading-state {
      text-align: center;
      color: var(--text-3);
      padding: 40px 0;
      font-size: 15px;
    }

    /* ── Placeholder Screens ── */
    .placeholder-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
    }
    .placeholder-icon { font-size: 48px; margin-bottom: 16px; }
    .placeholder-screen h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .placeholder-screen p { font-size: 14px; color: var(--text-2); line-height: 1.5; }

    /* ── Week Dashboard ── */
    .week-screen { padding: 0 16px 24px; }
    .week-header { padding: calc(var(--safe-top) + 12px) 0 12px; }
    .week-header-top { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; }
    .week-nav { display: flex; align-items: center; justify-content: space-between; }
    .week-range { font-size: 14px; color: var(--text-2); font-weight: 500; }

    .week-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
    .summary-card {
      background: var(--card); border-radius: 14px; border: 0.5px solid var(--border-1);
      padding: 12px 14px;
    }
    .summary-label { font-size: 11px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 4px; }
    .summary-values { display: flex; align-items: baseline; gap: 4px; margin-bottom: 6px; }
    .summary-actual { font-size: 22px; font-weight: 700; color: var(--text-1); }
    .summary-target { font-size: 13px; color: var(--text-3); font-weight: 500; }
    .summary-bar-track { height: 5px; background: var(--border-2); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
    .summary-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
    .summary-avg { font-size: 11px; color: var(--text-3); }

    .week-daily { background: var(--card); border-radius: 14px; border: 0.5px solid var(--border-1); padding: 14px; }
    .week-daily-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; }

    .daily-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .daily-row.today-row { font-weight: 600; }
    .daily-label { display: flex; align-items: center; gap: 5px; width: 48px; flex-shrink: 0; }
    .dt-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .daily-day { font-size: 12px; color: var(--text-2); }
    .today-row .daily-day { color: var(--text-1); font-weight: 700; }

    .daily-bar-container { flex: 1; display: flex; align-items: center; gap: 8px; }
    .daily-bar-track { flex: 1; height: 14px; background: var(--border-3); border-radius: 4px; position: relative; overflow: visible; }
    .daily-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
    .daily-target-line { position: absolute; top: -2px; bottom: -2px; width: 1.5px; background: var(--text-3); border-radius: 1px; }
    .daily-kcal { font-size: 12px; font-weight: 600; color: var(--text-1); min-width: 36px; text-align: right; font-variant-numeric: tabular-nums; }

    .week-legend { display: flex; gap: 12px; margin-top: 12px; padding-top: 10px; border-top: 0.5px solid var(--border-2); flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-3); }
    .target-line-legend { width: 1.5px; height: 12px; background: var(--text-3); border-radius: 1px; }

    /* ── Mealplan Screen ── */
    .mealplan-screen { padding: 0 16px 24px; }

    .mp-overview-card {
      background: var(--card); border-radius: 14px; border: 0.5px solid var(--border-1);
      padding: 14px; margin-bottom: 16px;
    }
    .mp-overview-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
    .mp-period { display: flex; gap: 12px; margin-bottom: 8px; }
    .mp-period:last-child { margin-bottom: 0; }
    .mp-period-label { font-size: 12px; font-weight: 600; color: var(--text-2); width: 52px; flex-shrink: 0; padding-top: 1px; }
    .mp-period-meals { flex: 1; }
    .mp-period-meal { font-size: 13px; color: var(--text-1); margin-bottom: 2px; }

    .mp-section-title { font-size: 12px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; padding-left: 4px; }
    .mp-recipes { display: flex; flex-direction: column; gap: 8px; }

    .mp-recipe-card {
      background: var(--card); border-radius: 14px; border: 0.5px solid var(--border-1); overflow: hidden;
    }
    .mp-recipe-header {
      display: flex; align-items: center; padding: 12px 14px; gap: 10px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .mp-recipe-header:active { background: var(--border-3); }
    .mp-recipe-info { flex: 1; min-width: 0; }
    .mp-recipe-name { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .mp-recipe-meta { font-size: 12px; color: var(--text-2); margin-top: 2px; }
    .mp-recipe-macros { font-size: 12px; color: var(--text-3); margin-top: 1px; font-variant-numeric: tabular-nums; }

    .mp-badge {
      font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .mp-badge.prep { background: #E6F1FB; color: #0C447C; }
    .mp-badge.fresh { background: #E1F5EE; color: #085041; }

    .mp-recipe-body {
      background: #fafaf8; border-top: 0.5px solid var(--border-2); padding: 10px 14px 14px;
    }
    .mp-ingredients-title { font-size: 11px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 8px; }
    .mp-ingredient-row { display: flex; align-items: baseline; gap: 8px; font-size: 13px; margin-bottom: 4px; }
    .mp-ingredient-name { flex: 1; color: var(--text-1); }
    .mp-ingredient-amount { color: var(--text-2); font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .mp-ingredient-kcal { color: var(--text-3); font-size: 11px; font-variant-numeric: tabular-nums; flex-shrink: 0; min-width: 48px; text-align: right; }

    .mp-standards {
      background: var(--card); border-radius: 14px; border: 0.5px solid var(--border-1); overflow: hidden;
    }
    .mp-standard-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px; font-size: 13px;
    }
    .mp-standard-row + .mp-standard-row { border-top: 0.5px solid var(--border-2); }
    .mp-standard-name { color: var(--text-2); }
    .mp-standard-kcal { color: var(--text-3); font-variant-numeric: tabular-nums; font-size: 12px; }

    /* ── Family Screen ── */
    .family-screen { padding: 0 16px 24px; }
    .family-header { padding: calc(var(--safe-top) + 12px) 0 12px; }

    .family-strip { display: flex; justify-content: space-between; margin-top: 10px; }
    .family-day {
      display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer;
      padding: 2px; border-radius: 10px;
    }
    .family-day.selected { background: rgba(32, 87, 129, 0.06); }
    .family-day:active { background: var(--border-3); }
    .family-day-label { font-size: 10px; font-weight: 500; color: var(--text-3); letter-spacing: 0.3px; }
    .family-day-circle {
      width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 500; color: var(--text-2); background: var(--border-3);
    }
    .family-day-circle.active { background: var(--kcal); color: #fff; font-weight: 600; }

    .family-daytype { margin-bottom: 12px; }
    .family-daytype-pill {
      display: inline-block; font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 8px;
    }

    .family-meals { display: flex; flex-direction: column; gap: 8px; }
    .family-meal-card {
      background: var(--card); border-radius: 14px; border: 0.5px solid var(--border-1); overflow: hidden;
    }
    .family-meal-header {
      display: flex; align-items: center; gap: 8px; padding: 10px 14px;
      border-bottom: 0.5px solid var(--border-2);
    }
    .family-meal-icon { font-size: 16px; }
    .family-meal-label { font-size: 13px; font-weight: 600; }

    .family-member-rows { padding: 6px 14px 8px; }
    .family-member-row {
      display: flex; align-items: center; gap: 8px; padding: 5px 0;
    }
    .family-member-row.dimmed { opacity: 0.4; }
    .family-avatar {
      width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
    }
    .family-member-meal { font-size: 13px; color: var(--text-1); }

    /* ── Login Screen ── */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
      background: var(--bg);
    }

    .login-card {
      width: 100%;
      max-width: 340px;
      text-align: center;
    }

    .login-icon-img { width: 72px; height: 72px; border-radius: 16px; margin-bottom: 12px; }

    .login-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .login-subtitle {
      font-size: 14px;
      color: var(--text-2);
      margin-bottom: 32px;
    }

    .login-fields {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }

    .login-input {
      width: 100%;
      padding: 14px 16px;
      border: 0.5px solid var(--border-1);
      border-radius: 12px;
      background: var(--card);
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .login-input:focus { border-color: var(--kcal); }

    .login-error {
      font-size: 13px;
      color: var(--warn-high);
      margin-bottom: 12px;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--kcal);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .login-btn:active { opacity: 0.85; }
    .login-btn.loading { opacity: 0.6; pointer-events: none; }

    /* ── Settings ── */
    .settings-screen { padding: 24px 16px; }
    .settings-title { font-size: 28px; font-weight: 700; margin-bottom: 24px; }
    .settings-section { margin-bottom: 24px; }
    .settings-label { font-size: 12px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; padding-left: 4px; }
    .settings-card { background: var(--card); border-radius: 14px; border: 0.5px solid var(--border-1); overflow: hidden; }
    .settings-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; font-size: 15px; }
    .settings-row + .settings-row { border-top: 0.5px solid var(--border-2); }
    .settings-row.clickable { cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .settings-row.clickable:active { background: var(--border-3); }
    .settings-row.danger { color: var(--warn-high); }
    .settings-value { color: var(--text-2); font-size: 14px; }
    .settings-arrow { color: var(--text-3); }
    .settings-version { text-align: center; color: var(--text-4); font-size: 12px; margin-top: 32px; }

    /* Import Section */
    .import-section { padding: 12px 16px 16px; border-top: 0.5px solid var(--border-2); }
    .import-textarea {
      width: 100%; padding: 12px; border: 0.5px solid var(--border-1); border-radius: 10px;
      font-family: 'SF Mono', 'Menlo', monospace; font-size: 12px; line-height: 1.4;
      background: var(--bg); resize: vertical; outline: none; box-sizing: border-box;
    }
    .import-textarea:focus { border-color: var(--kcal); }
    .import-actions { margin-top: 10px; display: flex; justify-content: flex-end; }
    .import-actions .sheet-btn { flex: none; padding: 10px 24px; font-size: 14px; }
    .import-msg { margin-top: 10px; font-size: 13px; padding: 10px 12px; border-radius: 8px; }
    .import-msg.success { background: #e1f5ee; color: #085041; }
    .import-msg.error { background: #fde8e8; color: #a42059; }

    /* ── Bottom Sheet (Edit Meal) ── */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } }

    .sheet {
      background: var(--card);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 430px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: var(--border-2);
      border-radius: 2px;
      margin: 8px auto 0;
      flex-shrink: 0;
    }

    .sheet-top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px 8px;
      flex-shrink: 0;
    }
    .sheet-top-bar h3 { font-size: 18px; font-weight: 700; }
    .sheet-close {
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: var(--text-3); cursor: pointer; border-radius: 50%;
      background: var(--border-3);
    }
    .sheet-close:active { background: var(--border-2); }

    .sheet-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 4px 20px 16px;
    }

    .sheet-header h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .sheet-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .sheet-input {
      width: 100%;
      padding: 12px 14px;
      border: 0.5px solid var(--border-1);
      border-radius: 10px;
      font-size: 16px;
      background: var(--bg);
      outline: none;
    }
    .sheet-input:focus { border-color: var(--kcal); }

    .sheet-macros-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .sheet-macro {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sheet-macro-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .sheet-macro-input {
      width: 100%;
      padding: 10px 12px;
      border: 0.5px solid var(--border-1);
      border-radius: 10px;
      font-size: 16px;
      background: var(--bg);
      outline: none;
      font-variant-numeric: tabular-nums;
    }
    .sheet-macro-input:focus { border-color: var(--kcal); }

    .sheet-footer-sticky {
      display: flex;
      gap: 10px;
      padding: 12px 20px calc(12px + var(--safe-bottom));
      border-top: 0.5px solid var(--border-2);
      flex-shrink: 0;
    }

    .sheet-btn {
      flex: 1;
      padding: 14px;
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .sheet-btn.cancel {
      background: var(--border-2);
      color: var(--text-1);
    }
    .sheet-btn.save {
      background: var(--kcal);
      color: #fff;
    }
    .sheet-btn:active { opacity: 0.85; }

    /* Sheet Items Editing */
    .sheet-items { margin-bottom: 8px; }
    .sheet-item-block { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 0.5px solid var(--border-3); }
    .sheet-item-block:last-of-type { border-bottom: none; }
    .sheet-item-row {
      display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
    }
    .sheet-item-name {
      flex: 1; padding: 8px 10px; border: 0.5px solid var(--border-1); border-radius: 8px;
      font-size: 14px; background: var(--bg); outline: none; min-width: 0;
    }
    .sheet-item-name:focus { border-color: var(--kcal); }
    .sheet-item-amount {
      width: 56px; padding: 8px 6px; border: 0.5px solid var(--border-1); border-radius: 8px;
      font-size: 14px; background: var(--bg); outline: none; text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .sheet-item-amount:focus { border-color: var(--kcal); }
    .sheet-item-unit { font-size: 12px; color: var(--text-3); width: 14px; }
    .sheet-item-remove {
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: var(--text-3); cursor: pointer; border-radius: 6px; flex-shrink: 0;
    }
    .sheet-item-remove:active { background: var(--border-2); color: var(--warn-high); }

    .sheet-item-macros-row {
      display: flex; gap: 6px; padding-left: 2px;
    }
    .sheet-item-macro-display {
      font-size: 11px; color: var(--text-3); font-variant-numeric: tabular-nums;
    }

    .sheet-per100-toggle {
      font-size: 11px; color: var(--kcal); cursor: pointer; padding: 4px 2px;
      -webkit-tap-highlight-color: transparent;
    }
    .sheet-per100-row {
      display: flex; gap: 4px; margin-bottom: 6px;
    }
    .sheet-per100-input {
      width: 25%; padding: 6px 4px; border: 0.5px solid var(--kcal); border-radius: 6px;
      font-size: 12px; background: rgba(32,87,129,0.04); outline: none; text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .sheet-per100-input:focus { background: rgba(32,87,129,0.08); }
    .sheet-per100-input::placeholder { color: var(--text-4); font-size: 10px; }

    .sheet-item-actions { display: flex; justify-content: space-between; align-items: center; }
    .sheet-add-item {
      font-size: 13px; color: var(--kcal); font-weight: 500; cursor: pointer;
      padding: 8px 0 4px; -webkit-tap-highlight-color: transparent;
    }
    .sheet-add-item:active { opacity: 0.6; }
    .sheet-undo {
      font-size: 12px; color: var(--warn-high); font-weight: 500; cursor: pointer;
      padding: 8px 0 4px; -webkit-tap-highlight-color: transparent;
    }
    .sheet-undo:active { opacity: 0.6; }

    .sheet-direct-toggle {
      font-size: 12px; color: var(--text-3); cursor: pointer; margin: 12px 0 8px;
      -webkit-tap-highlight-color: transparent;
    }

    /* Scope Toggle */
    .sheet-scope { margin-top: 16px; }
    .sheet-scope-label { font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
    .sheet-scope-options { display: flex; gap: 8px; }
    .sheet-scope-opt {
      flex: 1; text-align: center; padding: 10px; font-size: 13px; font-weight: 500;
      border-radius: 10px; cursor: pointer; border: 1.5px solid var(--border-2);
      color: var(--text-2); -webkit-tap-highlight-color: transparent; transition: all 0.15s;
    }
    .sheet-scope-opt.active {
      border-color: var(--kcal); background: rgba(32, 87, 129, 0.06); color: var(--kcal); font-weight: 600;
    }
    .sheet-scope-opt:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
